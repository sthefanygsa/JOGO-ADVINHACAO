<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Jogo de Adivinhação</h1>
    <p>Estou pensando em um número entre 1 e 100. Tente adivinhar!</p>
    <input type="number" id="campoPalpite" placeholder="Digite seu palpite">
    <button onclick="verificarPalpite()">Enviar palpite</button>
    <p id="mensagem"></p>
    <p>Tentativas restantes: <span id="tentativas">10</span></p>

    <div id="botaoRecarregar" style="display: none;">
        <button onclick="recarregarPagina()">Jogar novamente</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
